# Configuracao do Banco H2
#spring.datasource.url=jdbc:h2:mem:biblioteca
spring.datasource.url=jdbc:h2:file:/home/site/wwwroot/data/bibliotecadb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=senha123
spring.datasource.type=com.zaxxer.hikari.HikariDataSource

# Configuracao do Spring Security
spring.security.user.name=admin
spring.security.user.password=admin123

# Configuracao do JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Console H2 (acessivel em http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Nome da aplicacao
spring.application.name=gerenciador-biblioteca