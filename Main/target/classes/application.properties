# Configuraïŋ―ïŋ―o do Banco H2
spring.datasource.url=jdbc:h2:mem:biblioteca
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Configuraïŋ―ïŋ―o do Spring Security
spring.security.user.name=admin
spring.security.user.password=admin123

# Configuraïŋ―ïŋ―o do JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Console H2 (acessïŋ―vel em http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Nome da aplicaïŋ―ïŋ―o
spring.application.name=gerenciador-biblioteca