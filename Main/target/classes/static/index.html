<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciador de Biblioteca</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body { background-color: #f8f9fa; }
    .nav-link { cursor: pointer; }
    .section { display: none; }
    .section.active { display: block; }
    .table-responsive { margin-top: 20px; }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
            <span class="navbar-brand">
                <i class="bi bi-book"></i> Gerenciador de Biblioteca
            </span>
    <div class="navbar-nav ms-auto">
      <a class="nav-link text-white" onclick="mostrarSecao('usuarios')">
        <i class="bi bi-people"></i> Usuários
      </a>
      <a class="nav-link text-white ms-3" onclick="mostrarSecao('livros')">
        <i class="bi bi-book-half"></i> Livros
      </a>
      <a class="nav-link text-white ms-3" onclick="mostrarSecao('emprestimos')">
        <i class="bi bi-arrow-left-right"></i> Empréstimos
      </a>
    </div>
  </div>
</nav>

<div class="container mt-4">

  <!-- ==================== SEÇÃO USUÁRIOS ==================== -->
  <div id="secao-usuarios" class="section active">
    <h4><i class="bi bi-people"></i> Usuários</h4>
    <hr>

    <!-- Formulário -->
    <div class="card mb-4">
      <div class="card-body">
        <h6 class="card-title" id="titulo-form-usuario">Cadastrar Usuário</h6>
        <input type="hidden" id="usuario-id">
        <div class="row g-3">
          <div class="col-md-4">
            <input type="text" id="usuario-nome" class="form-control" placeholder="Nome">
          </div>
          <div class="col-md-4">
            <input type="email" id="usuario-email" class="form-control" placeholder="Email">
          </div>
          <div class="col-md-4">
            <input type="text" id="usuario-telefone" class="form-control" placeholder="Telefone">
          </div>
        </div>
        <div class="mt-3">
          <button class="btn btn-primary" onclick="salvarUsuario()">
            <i class="bi bi-save"></i> Salvar
          </button>
          <button class="btn btn-secondary ms-2" onclick="limparFormUsuario()">
            <i class="bi bi-x-circle"></i> Cancelar
          </button>
        </div>
        <div id="erro-usuario" class="alert alert-danger mt-3 d-none"></div>
      </div>
    </div>

    <!-- Tabela -->
    <div class="table-responsive">
      <table class="table table-bordered table-hover bg-white">
        <thead class="table-dark">
        <tr>
          <th>#</th>
          <th>Nome</th>
          <th>Email</th>
          <th>Telefone</th>
          <th>Ações</th>
        </tr>
        </thead>
        <tbody id="tabela-usuarios"></tbody>
      </table>
    </div>
  </div>

  <!-- ==================== SEÇÃO LIVROS ==================== -->
  <div id="secao-livros" class="section">
    <h4><i class="bi bi-book-half"></i> Livros</h4>
    <hr>

    <!-- Formulário -->
    <div class="card mb-4">
      <div class="card-body">
        <h6 class="card-title" id="titulo-form-livro">Cadastrar Livro</h6>
        <input type="hidden" id="livro-id">
        <div class="row g-3">
          <div class="col-md-4">
            <input type="text" id="livro-titulo" class="form-control" placeholder="Título">
          </div>
          <div class="col-md-4">
            <input type="text" id="livro-autor" class="form-control" placeholder="Autor">
          </div>
          <div class="col-md-4">
            <input type="text" id="livro-isbn" class="form-control" placeholder="ISBN">
          </div>
        </div>
        <div class="mt-3">
          <button class="btn btn-primary" onclick="salvarLivro()">
            <i class="bi bi-save"></i> Salvar
          </button>
          <button class="btn btn-secondary ms-2" onclick="limparFormLivro()">
            <i class="bi bi-x-circle"></i> Cancelar
          </button>
        </div>
        <div id="erro-livro" class="alert alert-danger mt-3 d-none"></div>
      </div>
    </div>

    <!-- Tabela -->
    <div class="table-responsive">
      <table class="table table-bordered table-hover bg-white">
        <thead class="table-dark">
        <tr>
          <th>#</th>
          <th>Título</th>
          <th>Autor</th>
          <th>ISBN</th>
          <th>Disponível</th>
          <th>Ações</th>
        </tr>
        </thead>
        <tbody id="tabela-livros"></tbody>
      </table>
    </div>
  </div>

  <!-- ==================== SEÇÃO EMPRÉSTIMOS ==================== -->
  <div id="secao-emprestimos" class="section">
    <h4><i class="bi bi-arrow-left-right"></i> Empréstimos</h4>
    <hr>

    <!-- Formulário -->
    <div class="card mb-4">
      <div class="card-body">
        <h6 class="card-title">Registrar Empréstimo</h6>
        <div class="row g-3">
          <div class="col-md-6">
            <select id="emprestimo-usuario" class="form-select">
              <option value="">Selecione o Usuário</option>
            </select>
          </div>
          <div class="col-md-6">
            <select id="emprestimo-livro" class="form-select">
              <option value="">Selecione o Livro</option>
            </select>
          </div>
        </div>
        <div class="mt-3">
          <button class="btn btn-primary" onclick="registrarEmprestimo()">
            <i class="bi bi-plus-circle"></i> Registrar
          </button>
        </div>
        <div id="erro-emprestimo" class="alert alert-danger mt-3 d-none"></div>
      </div>
    </div>

    <!-- Tabela -->
    <div class="table-responsive">
      <table class="table table-bordered table-hover bg-white">
        <thead class="table-dark">
        <tr>
          <th>#</th>
          <th>Usuário</th>
          <th>Livro</th>
          <th>Data Empréstimo</th>
          <th>Data Devolução</th>
          <th>Status</th>
          <th>Ações</th>
        </tr>
        </thead>
        <tbody id="tabela-emprestimos"></tbody>
      </table>
    </div>
  </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
  // ==================== CONFIGURAÇÃO ====================
  const API = 'http://localhost:8080';
  const HEADERS = {
    'Content-Type': 'application/json',
    'Authorization': 'Basic ' + btoa('admin:admin123')
  };

  // ==================== NAVEGAÇÃO ====================
  function mostrarSecao(secao) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('secao-' + secao).classList.add('active');
    if (secao === 'emprestimos') carregarSelects();
  }

  // ==================== USUÁRIOS ====================
  async function carregarUsuarios() {
    const res = await fetch(`${API}/usuarios`, { headers: HEADERS });
    const usuarios = await res.json();
    const tbody = document.getElementById('tabela-usuarios');
    tbody.innerHTML = '';
    usuarios.forEach(u => {
      tbody.innerHTML += `
                    <tr>
                        <td>${u.id}</td>
                        <td>${u.nome}</td>
                        <td>${u.email}</td>
                        <td>${u.telefone}</td>
                        <td>
                            <button class="btn btn-sm btn-warning" onclick="editarUsuario(${u.id}, '${u.nome}', '${u.email}', '${u.telefone}')">
                                <i class="bi bi-pencil"></i>
                            </button>
                            <button class="btn btn-sm btn-danger ms-1" onclick="deletarUsuario(${u.id})">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>`;
    });
  }

  async function salvarUsuario() {
    const id = document.getElementById('usuario-id').value;
    const body = {
      nome: document.getElementById('usuario-nome').value,
      email: document.getElementById('usuario-email').value,
      telefone: document.getElementById('usuario-telefone').value
    };
    const url = id ? `${API}/usuarios/${id}` : `${API}/usuarios`;
    const method = id ? 'PUT' : 'POST';
    const res = await fetch(url, { method, headers: HEADERS, body: JSON.stringify(body) });
    if (res.ok) {
      limparFormUsuario();
      carregarUsuarios();
    } else {
      const erro = await res.json();
      mostrarErro('erro-usuario', erro);
    }
  }

  function editarUsuario(id, nome, email, telefone) {
    document.getElementById('usuario-id').value = id;
    document.getElementById('usuario-nome').value = nome;
    document.getElementById('usuario-email').value = email;
    document.getElementById('usuario-telefone').value = telefone;
    document.getElementById('titulo-form-usuario').textContent = 'Editar Usuário';
  }

  async function deletarUsuario(id) {
    if (!confirm('Deseja deletar este usuário?')) return;
    await fetch(`${API}/usuarios/${id}`, { method: 'DELETE', headers: HEADERS });
    carregarUsuarios();
  }

  function limparFormUsuario() {
    document.getElementById('usuario-id').value = '';
    document.getElementById('usuario-nome').value = '';
    document.getElementById('usuario-email').value = '';
    document.getElementById('usuario-telefone').value = '';
    document.getElementById('titulo-form-usuario').textContent = 'Cadastrar Usuário';
    document.getElementById('erro-usuario').classList.add('d-none');
  }

  // ==================== LIVROS ====================
  async function carregarLivros() {
    const res = await fetch(`${API}/livros`, { headers: HEADERS });
    const livros = await res.json();
    const tbody = document.getElementById('tabela-livros');
    tbody.innerHTML = '';
    livros.forEach(l => {
      tbody.innerHTML += `
                    <tr>
                        <td>${l.id}</td>
                        <td>${l.titulo}</td>
                        <td>${l.autor}</td>
                        <td>${l.isbn}</td>
                        <td>
                            <span class="badge ${l.disponivel ? 'bg-success' : 'bg-danger'}">
                                ${l.disponivel ? 'Disponível' : 'Emprestado'}
                            </span>
                        </td>
                        <td>
                            <button class="btn btn-sm btn-warning" onclick="editarLivro(${l.id}, '${l.titulo}', '${l.autor}', '${l.isbn}')">
                                <i class="bi bi-pencil"></i>
                            </button>
                            <button class="btn btn-sm btn-danger ms-1" onclick="deletarLivro(${l.id})">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>`;
    });
  }

  async function salvarLivro() {
    const id = document.getElementById('livro-id').value;
    const body = {
      titulo: document.getElementById('livro-titulo').value,
      autor: document.getElementById('livro-autor').value,
      isbn: document.getElementById('livro-isbn').value
    };
    const url = id ? `${API}/livros/${id}` : `${API}/livros`;
    const method = id ? 'PUT' : 'POST';
    const res = await fetch(url, { method, headers: HEADERS, body: JSON.stringify(body) });
    if (res.ok) {
      limparFormLivro();
      carregarLivros();
    } else {
      const erro = await res.json();
      mostrarErro('erro-livro', erro);
    }
  }

  function editarLivro(id, titulo, autor, isbn) {
    document.getElementById('livro-id').value = id;
    document.getElementById('livro-titulo').value = titulo;
    document.getElementById('livro-autor').value = autor;
    document.getElementById('livro-isbn').value = isbn;
    document.getElementById('titulo-form-livro').textContent = 'Editar Livro';
  }

  async function deletarLivro(id) {
    if (!confirm('Deseja deletar este livro?')) return;
    await fetch(`${API}/livros/${id}`, { method: 'DELETE', headers: HEADERS });
    carregarLivros();
  }

  function limparFormLivro() {
    document.getElementById('livro-id').value = '';
    document.getElementById('livro-titulo').value = '';
    document.getElementById('livro-autor').value = '';
    document.getElementById('livro-isbn').value = '';
    document.getElementById('titulo-form-livro').textContent = 'Cadastrar Livro';
    document.getElementById('erro-livro').classList.add('d-none');
  }

  // ==================== EMPRÉSTIMOS ====================
  async function carregarSelects() {
    const [resUsuarios, resLivros] = await Promise.all([
      fetch(`${API}/usuarios`, { headers: HEADERS }),
      fetch(`${API}/livros`, { headers: HEADERS })
    ]);
    const usuarios = await resUsuarios.json();
    const livros = await resLivros.json();

    const selUsuario = document.getElementById('emprestimo-usuario');
    const selLivro = document.getElementById('emprestimo-livro');

    selUsuario.innerHTML = '<option value="">Selecione o Usuário</option>';
    usuarios.forEach(u => {
      selUsuario.innerHTML += `<option value="${u.id}">${u.nome}</option>`;
    });

    selLivro.innerHTML = '<option value="">Selecione o Livro</option>';
    livros.filter(l => l.disponivel).forEach(l => {
      selLivro.innerHTML += `<option value="${l.id}">${l.titulo}</option>`;
    });
  }

  async function carregarEmprestimos() {
    const res = await fetch(`${API}/emprestimos`, { headers: HEADERS });
    const emprestimos = await res.json();
    const tbody = document.getElementById('tabela-emprestimos');
    tbody.innerHTML = '';
    emprestimos.forEach(e => {
      tbody.innerHTML += `
                    <tr>
                        <td>${e.id}</td>
                        <td>${e.usuario.nome}</td>
                        <td>${e.livro.titulo}</td>
                        <td>${e.dataEmprestimo}</td>
                        <td>${e.dataDevolucao ?? '-'}</td>
                        <td>
                            <span class="badge ${e.ativo ? 'bg-warning text-dark' : 'bg-success'}">
                                ${e.ativo ? 'Em andamento' : 'Devolvido'}
                            </span>
                        </td>
                        <td>
                            ${e.ativo ? `
                            <button class="btn btn-sm btn-success" onclick="devolverLivro(${e.id})">
                                <i class="bi bi-check-circle"></i> Devolver
                            </button>` : '-'}
                        </td>
                    </tr>`;
    });
  }

  async function registrarEmprestimo() {
    const usuarioId = document.getElementById('emprestimo-usuario').value;
    const livroId = document.getElementById('emprestimo-livro').value;
    if (!usuarioId || !livroId) {
      mostrarErro('erro-emprestimo', { erro: 'Selecione o usuário e o livro' });
      return;
    }
    const res = await fetch(`${API}/emprestimos?usuarioId=${usuarioId}&livroId=${livroId}`,
            { method: 'POST', headers: HEADERS });
    if (res.ok) {
      carregarEmprestimos();
      carregarSelects();
    } else {
      const erro = await res.json();
      mostrarErro('erro-emprestimo', erro);
    }
  }

  async function devolverLivro(id) {
    if (!confirm('Confirmar devolução?')) return;
    await fetch(`${API}/emprestimos/${id}/devolver`, { method: 'PUT', headers: HEADERS });
    carregarEmprestimos();
    carregarSelects();
  }

  // ==================== UTILITÁRIOS ====================
  function mostrarErro(elementId, erro) {
    const el = document.getElementById(elementId);
    el.classList.remove('d-none');

    // Erro de validação — exibe cada campo e sua mensagem
    if (erro.campos) {
      const mensagens = Object.entries(erro.campos)
              .map(([campo, mensagem]) => `<b>${campo}:</b> ${mensagem}`)
              .join('<br>');
      el.innerHTML = mensagens;
    } else {
      // Erro simples de regra de negócio
      el.textContent = erro.erro ?? 'Erro desconhecido';
    }
  }

  // ==================== INICIALIZAÇÃO ====================
  carregarUsuarios();
  carregarLivros();
  carregarEmprestimos();
</script>

</body>
</html>
